name: Build APK

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Bubblewrap
        run: |
          npm install -g @bubblewrap/cli
          mkdir -p ~/.bubblewrap
          echo '{"jdkPath":"'$JAVA_HOME'","androidSdkPath":"'$ANDROID_SDK_ROOT'"}' > ~/.bubblewrap/config.json

      - name: Init TWA with Python pexpect
        run: |
          pip install pexpect
          mkdir apk-build && cd apk-build
          python3 << 'PYEOF'
          import pexpect, sys
          child = pexpect.spawn('bubblewrap init --manifest https://contabilidad-xhus.vercel.app/manifest.json --directory . --skipPwaValidation', timeout=120, encoding='utf-8')
          child.logfile = sys.stdout
          responses = {
            'install the JDK': 'n',
            'Domain:': '',
            'URL path:': '',
            'Application name:': '',
            'short name:': '',
            'version name:': '',
            'version code:': '',
            'Display mode:': '',
            'Orientation:': '',
            'color': '',
            'Splash': '',
            'icon URL': '',
            'maskable': '',
            'monochrome': '',
            'include': '',
            'Play': '',
          }
          while True:
            try:
              idx = child.expect(list(responses.keys()) + [pexpect.EOF])
              if idx >= len(responses):
                break
              key = list(responses.keys())[idx]
              child.sendline(responses[key])
            except pexpect.EOF:
              break
          child.wait()
          PYEOF

      - name: Build APK
        run: |
          cd apk-build
          bubblewrap build --skipPwaValidation

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: contabilidad-xhus-apk
          path: apk-build/app-release-unsigned.apk
