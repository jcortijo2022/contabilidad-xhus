name: Build APK

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Bubblewrap
        run: |
          npm install -g @bubblewrap/cli
          mkdir -p ~/.bubblewrap
          echo '{"jdkPath":"'$JAVA_HOME'","androidSdkPath":"'$ANDROID_SDK_ROOT'"}' > ~/.bubblewrap/config.json

      - name: Init TWA with Python pexpect
        run: |
          pip install pexpect
          mkdir apk-build && cd apk-build
          python3 << 'PYEOF'
          import pexpect, sys
          child = pexpect.spawn('bubblewrap init --manifest https://contabilidad-xhus.vercel.app/manifest.json --directory . --skipPwaValidation', timeout=180, encoding='utf-8')
          child.logfile = sys.stdout
          patterns = [
            ('install the JDK', 'n'),
            ('Domain:', ''),
            ('URL path:', ''),
            ('Application name:', ''),
            ('short name:', ''),
            ('version name:', ''),
            ('version code:', ''),
            ('Display mode:', ''),
            ('Orientation:', ''),
            ('Status bar color:', ''),
            ('Splash screen color:', ''),
            ('Icon URL:', ''),
            ('Maskable icon URL:', ''),
            ('Monochrome icon URL:', ''),
            ('Play Billing', 'n'),
            ('geolocation', 'n'),
            ('Key store location:', ''),
            ('Key name:', ''),
            ('create one now', 'y'),
            ('first and last name', 'Xhus App'),
            ('organizational unit', 'Dev'),
            ('organization', 'Xhus'),
            ('City or Locality', 'Valencia'),
            ('State or Province', 'Valencia'),
            ('country code', 'ES'),
            ('password', 'android123'),
            ('password for', 'android123'),
            ('Re-enter', 'android123'),
            ('correct', 'yes'),
          ]
          while True:
            try:
              keys = [p[0] for p in patterns]
              idx = child.expect(keys + [pexpect.EOF], timeout=60)
              if idx >= len(patterns):
                break
              child.sendline(patterns[idx][1])
            except pexpect.EOF:
              break
            except pexpect.TIMEOUT:
              break
          child.wait()
          PYEOF

      - name: Build APK
        run: |
          cd apk-build
          bubblewrap build --skipPwaValidation

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: contabilidad-xhus-apk
          path: apk-build/app-release-unsigned.apk
