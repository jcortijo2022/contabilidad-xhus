name: Build APK

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate APK via PWABuilder API
        run: |
          curl -X POST https://pwabuilder-apk-service.azurewebsites.net/generateApkZip \
            -H "Content-Type: application/json" \
            -d '{
              "packageId": "com.xhus.contabilidad",
              "name": "Contabilidad Xhus",
              "launcherName": "Xhus",
              "appVersion": "1.0.0",
              "appVersionCode": 1,
              "host": "contabilidad-xhus.vercel.app",
              "startUrl": "/",
              "themeColor": "#818cf8",
              "navigationColor": "#818cf8",
              "backgroundColor": "#0a0c14",
              "iconUrl": "https://contabilidad-xhus.vercel.app/icon-512.png",
              "maskableIconUrl": "https://contabilidad-xhus.vercel.app/icon-512.png",
              "monochromeIconUrl": "https://contabilidad-xhus.vercel.app/icon-512.png",
              "signingMode": "none",
              "display": "standalone",
              "orientation": "default",
              "enableNotifications": false,
              "enableSiteSettingsShortcut": true,
              "isChromeOSOnly": false,
              "isMetaQuest": false,
              "fallbackType": "customtabs",
              "webManifestUrl": "https://contabilidad-xhus.vercel.app/manifest.json"
            }' \
            --output apk.zip --location

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: contabilidad-xhus-apk
          path: apk.zip
