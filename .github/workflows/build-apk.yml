name: Build APK

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Clone modern TWA template
        run: git clone https://github.com/chromeos/pwa-in-play-store.git twa-app

      - name: Configure TWA
        run: |
          cd twa-app
          sed -i 's/hostName = .*/hostName = "contabilidad-xhus.vercel.app"/' app/build.gradle
          sed -i 's/defaultUrl = .*/defaultUrl = "\/"/' app/build.gradle
          sed -i 's/applicationId = .*/applicationId = "com.xhus.contabilidad"/' app/build.gradle

      - name: Build APK
        run: |
          cd twa-app
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: contabilidad-xhus-apk
          path: twa-app/app/build/outputs/apk/debug/app-debug.apk
