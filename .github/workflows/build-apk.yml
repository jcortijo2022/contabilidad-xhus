name: Build APK

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 11
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 11

      - name: Clone TWA Quickstart
        run: git clone https://github.com/GoogleChromeLabs/svgomg-twa.git twa-app

      - name: Build APK
        run: |
          cd twa-app
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: contabilidad-xhus-apk
          path: twa-app/app/build/outputs/apk/debug/app-debug.apk
