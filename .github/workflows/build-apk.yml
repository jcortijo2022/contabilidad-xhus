name: Build APK

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install PWABuilder CLI
        run: npm install -g @pwabuilder/pwabuilder

      - name: Build Android Package
        run: |
          pwabuilder package -p android -u https://contabilidad-xhus.vercel.app -d ./output

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: contabilidad-xhus-apk
          path: ./output/
