name: Build APK

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Bubblewrap
        run: |
          npm install -g @bubblewrap/cli
          mkdir -p ~/.bubblewrap
          echo '{"jdkPath":"'$JAVA_HOME'","androidSdkPath":"'$ANDROID_SDK_ROOT'"}' > ~/.bubblewrap/config.json

      - name: Create keystore
        run: |
          mkdir -p apk-build
          keytool -genkey -v \
            -keystore apk-build/android.keystore \
            -alias android \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass android123 \
            -keypass android123 \
            -dname "CN=Xhus App, OU=Dev, O=Xhus, L=Valencia, ST=Valencia, C=ES"

      - name: Init TWA with pexpect
        run: |
          pip install pexpect
          cd apk-build
          python3 << 'PYEOF'
          import pexpect, sys, time
          child = pexpect.spawn('bubblewrap init --manifest https://contabilidad-xhus.vercel.app/manifest.json --directory . --skipPwaValidation', timeout=180, encoding='utf-8')
          child.logfile = sys.stdout
          patterns = [
            ('install the JDK', 'n'),
            ('Domain:', ''),
            ('URL path:', ''),
            ('Application name:', ''),
            ('short name:', ''),
            ('version name:', ''),
            ('version code:', ''),
            ('Display mode:', ''),
            ('Orientation:', ''),
            ('Status bar color:', ''),
            ('Splash screen color:', ''),
            ('Icon URL:', ''),
            ('Maskable icon URL:', ''),
            ('Monochrome icon URL:', ''),
            ('Play Billing', 'n'),
            ('geolocation', 'n'),
            ('Key store location:', ''),
            ('Key name:', ''),
            ('create one now', 'n'),
          ]
          while True:
            try:
              keys = [p[0] for p in patterns]
              idx = child.expect(keys + [pexpect.EOF], timeout=60)
              if idx >= len(patterns):
                break
              time.sleep(0.5)
              child.sendline(patterns[idx][1])
            except (pexpect.EOF, pexpect.TIMEOUT):
              break
          child.wait()
          PYEOF

      - name: Build APK
        run: |
          cd apk-build
          bubblewrap build --skipPwaValidation

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: contabilidad-xhus-apk
          path: apk-build/app-release-unsigned.apk
