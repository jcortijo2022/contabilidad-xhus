name: Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install Bubblewrap
        run: npm install -g @bubblewrap/cli

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: 17

      - name: Init TWA
        run: |
          mkdir apk-build
          cd apk-build
          bubblewrap init --manifest https://contabilidad-xhus.vercel.app/manifest.json --directory .

      - name: Build APK
        run: |
          cd apk-build
          bubblewrap build --skipPwaValidation

      - name: Upload APK
        uses: actions/upload-artifact@v3
        with:
          name: contabilidad-xhus-apk
          path: apk-build/app-release-unsigned.apk
