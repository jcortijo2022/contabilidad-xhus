name: Build APK

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Clone TWA Quickstart
        run: |
          git clone https://github.com/GoogleChromeLabs/svgomg-twa.git twa-app
          cd twa-app
          cat > app/build.gradle << 'GRADLE'
          apply plugin: 'com.android.application'
          android {
            compileSdkVersion 33
            defaultConfig {
              applicationId "com.xhus.contabilidad"
              minSdkVersion 19
              targetSdkVersion 33
              versionCode 1
              versionName "1.0"
            }
          }
          dependencies {
            implementation 'com.google.androidbrowserhelper:androidbrowserhelper:2.4.0'
          }
          GRADLE

      - name: Build APK
        run: |
          cd twa-app
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: contabilidad-xhus-apk
          path: twa-app/app/build/outputs/apk/debug/app-debug.apk
