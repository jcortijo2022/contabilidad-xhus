name: Build APK

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install Bubblewrap and pre-configure
        run: |
          npm install -g @bubblewrap/cli
          mkdir -p ~/.bubblewrap
          cat > ~/.bubblewrap/config.json << 'BEOF'
          {
            "jdkPath": "/opt/hostedtoolcache/Java_Temurin_jdk/17.0.14-7/x64",
            "androidSdkPath": "/usr/local/lib/android/sdk"
          }
          BEOF

      - name: Init and Build TWA
        run: |
          mkdir apk-build && cd apk-build
          bubblewrap init --manifest https://contabilidad-xhus.vercel.app/manifest.json --directory . --skipPwaValidation --yes
          bubblewrap build --skipPwaValidation

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: contabilidad-xhus-apk
          path: apk-build/app-release-unsigned.apk
